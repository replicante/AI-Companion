<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Antenna -->
  <line x1="32" y1="4" x2="32" y2="12" stroke="#5b9bd5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="4" r="3" fill="#5b9bd5"/>

  <!-- Head -->
  <rect x="10" y="12" width="44" height="34" rx="8" ry="8" fill="#2c3e50"/>
  <rect x="12" y="14" width="40" height="30" rx="6" ry="6" fill="#34495e"/>

  <!-- Eyes -->
  <rect x="16" y="21" width="12" height="10" rx="3" ry="3" fill="#1a1a2e"/>
  <rect x="36" y="21" width="12" height="10" rx="3" ry="3" fill="#1a1a2e"/>
  <!-- Eye glow -->
  <rect x="17" y="22" width="10" height="8" rx="2" ry="2" fill="#00bfff" opacity="0.9"/>
  <rect x="37" y="22" width="10" height="8" rx="2" ry="2" fill="#00bfff" opacity="0.9"/>
  <!-- Eye shine -->
  <rect x="18" y="23" width="3" height="2" rx="1" fill="white" opacity="0.6"/>
  <rect x="38" y="23" width="3" height="2" rx="1" fill="white" opacity="0.6"/>

  <!-- Mouth panel -->
  <rect x="16" y="36" width="32" height="5" rx="2" ry="2" fill="#1a1a2e"/>
  <!-- Mouth LEDs -->
  <rect x="18" y="37.5" width="4" height="2" rx="1" fill="#00ff88" opacity="0.85"/>
  <rect x="24" y="37.5" width="4" height="2" rx="1" fill="#00ff88" opacity="0.65"/>
  <rect x="30" y="37.5" width="4" height="2" rx="1" fill="#00ff88" opacity="0.45"/>
  <rect x="36" y="37.5" width="4" height="2" rx="1" fill="#00ff88" opacity="0.25"/>
  <rect x="42" y="37.5" width="4" height="2" rx="1" fill="#00ff88" opacity="0.10"/>

  <!-- Ears / side bolts -->
  <rect x="5" y="22" width="5" height="12" rx="2" fill="#2c3e50"/>
  <rect x="54" y="22" width="5" height="12" rx="2" fill="#2c3e50"/>

  <!-- Neck -->
  <rect x="24" y="46" width="16" height="6" rx="3" fill="#2c3e50"/>
</svg>
